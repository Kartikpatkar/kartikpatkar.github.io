<svg xmlns="http://www.w3.org/2000/svg" width="840" height="840" viewBox="0 0 840 840" role="img" aria-label="Profile placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#9affc5" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="840" height="840" rx="56" fill="#0b1020"/>
  <circle cx="210" cy="190" r="170" fill="url(#g)" filter="url(#soft)" opacity="0.32"/>
  <circle cx="700" cy="230" r="210" fill="url(#g)" filter="url(#soft)" opacity="0.22"/>
  <circle cx="420" cy="720" r="260" fill="url(#g)" filter="url(#soft)" opacity="0.18"/>

  <g fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2">
    <rect x="70" y="70" width="700" height="700" rx="44"/>
  </g>

  <g transform="translate(0 10)">
    <circle cx="420" cy="340" r="100" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <path d="M240 690c30-140 150-220 180-220s150 80 180 220" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>

    <text x="420" y="430" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" fill="rgba(255,255,255,0.70)">
      Add your photo
    </text>
  </g>
</svg>
